<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生态平台 - 套餐运营</title>
<style>
:root {
  --primary:#2563EB;--primary-hover:#1D4ED8;--primary-light:#EFF6FF;
  --gray-900:#0F172A;--gray-700:#334155;--gray-500:#64748B;
  --gray-400:#94A3B8;--gray-200:#E2E8F0;--gray-100:#F1F5F9;
  --gray-50:#F8FAFC;--white:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:14px;color:var(--gray-700);background:var(--gray-50);display:flex;height:100vh;overflow:hidden;}
.sidebar{width:240px;background:var(--white);border-right:1px solid var(--gray-200);display:flex;flex-direction:column;flex-shrink:0;height:100vh;}
.sidebar-logo{height:64px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--gray-200);gap:10px;}
.logo-icon{width:32px;height:32px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:15px;font-weight:600;color:var(--gray-900);}
.sidebar-nav{padding:12px 8px;flex:1;overflow-y:auto;}
.nav-section-title{font-size:11px;font-weight:500;color:var(--gray-400);padding:8px 12px 4px;text-transform:uppercase;letter-spacing:.05em;}
.nav-item{display:flex;align-items:center;gap:10px;padding:0 12px;height:36px;border-radius:6px;cursor:pointer;color:var(--gray-500);font-size:14px;transition:all .15s;margin-bottom:2px;text-decoration:none;}
.nav-item:hover{background:var(--gray-100);color:var(--gray-700);}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:500;}
.nav-parent{display:flex;align-items:center;gap:10px;padding:0 12px;height:36px;border-radius:6px;cursor:pointer;color:var(--gray-700);font-size:14px;font-weight:500;transition:all .15s;margin-bottom:2px;user-select:none;}
.nav-parent:hover{background:var(--gray-100);}
.nav-parent .nav-arrow{width:14px;height:14px;color:var(--gray-400);transition:transform .2s;margin-left:auto;flex-shrink:0;}
.nav-parent.collapsed .nav-arrow{transform:rotate(-90deg);}
.nav-sub{overflow:hidden;transition:max-height .25s ease;}
.nav-sub.collapsed{max-height:0 !important;overflow:hidden;}
.nav-sub .nav-item{font-size:13px;height:32px;padding-left:36px;}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--gray-200);}
.prd-link{display:flex;align-items:center;justify-content:center;height:36px;padding:0 12px;border-radius:6px;font-size:13px;font-weight:500;color:var(--primary);text-decoration:none;transition:all .15s;}
.prd-link:hover{background:var(--primary-light);}
.main-frame{flex:1;border:none;width:100%;height:100%;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
    <span class="logo-text">生态平台</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">核心功能</div>

    <!-- 应用管理 -->
    <a class="nav-item active" id="nav-app" onclick="navigate('app-list.html',this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>应用管理
    </a>

    <!-- 套餐管理 -->
    <div class="nav-parent" onclick="toggleNav(this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      套餐管理
      <svg class="nav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="nav-sub" id="sub-pkg">
      <a class="nav-item" id="nav-pkg-config" onclick="navigate('pkg-config.html',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>套餐配置
      </a>
    </div>

    <!-- 运营管理 -->
    <div class="nav-parent" onclick="toggleNav(this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
      运营管理
      <svg class="nav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="nav-sub" id="sub-ops">
      <a class="nav-item" id="nav-ops-mall" onclick="navigate('ops-mall.html',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>商城位运营
      </a>
      <a class="nav-item" id="nav-ops-recommend" onclick="navigate('ops-recommend.html',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>推荐位运营
      </a>
      <a class="nav-item" id="nav-ops-usergroup" onclick="navigate('ops-user-group.html',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>用户分群
      </a>
    </div>
  </nav>
  <div class="sidebar-footer" style="display:none">
    <a href="#" class="prd-link">需求文档PRD</a>
  </div>
</aside>

<iframe id="mainFrame" class="main-frame" src="app-list.html"></iframe>

<script>
function toggleNav(parentEl) {
  parentEl.classList.toggle('collapsed');
  var sub = parentEl.nextElementSibling;
  if (sub && sub.classList.contains('nav-sub')) {
    sub.classList.toggle('collapsed');
  }
}

function navigate(url, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('mainFrame').src = url;
}

// 子页面可以通过 parent.navigate 跳转
window.navigateFromChild = function(url) {
  document.getElementById('mainFrame').src = url;
};
</script>
</body>
</html>
